name: Generate snake animation

on:
  schedule:
    - cron: "* */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ------------------ GENERATE SNAKES ------------------

      - name: Generate snake (dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: profile/snake-dark.svg?palette=github-dark

      - name: Generate snake (light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: profile/snake-light.svg?palette=github-light

      # ------------------ COMMIT ------------------

      - name: Commit snake animations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/snake*.svg
          git commit -m "Update snake animations (light + dark)" || exit 0
          git push
